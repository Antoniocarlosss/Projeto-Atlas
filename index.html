<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Painel - Gestão de Fábrica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="tela-login">
        <div class="login-box">
    <img src="logo.png" alt="Atlas" class="logo-login">
    <h1>Acesso Restrito</h1>
    <input type="email" id="login-email" placeholder="ID Do Usuário">
    
    <div class="input-wrapper">
        <input type="password" id="login-senha" placeholder="Senha">
        <span class="toggle-eye" onclick="toggleVisibility('login-senha', this)">👁️</span>
    </div>
    
    <button onclick="fazerLogin()" class="btn-primary">ENTRAR</button>
</div>
    </section>

    <div id="app-principal" style="display:none;">
        <header class="no-print">
            <img src="logo.png" alt="Atlas" class="logo-header">
            <div class="user-info">
                <span id="user-display"></span>
                <button onclick="location.reload()" class="btn-logout">Sair</button>
            </div>
        </header>

        <main class="no-print">
           <section id="grid-home" class="grid-container">
    <div class="card blue" onclick="abrirModulo('Injeção')"><i>⚙️</i><span>Injeção</span></div>
    <div class="card orange" onclick="abrirModulo('Bobines')"><i>🌀</i><span>Bobines</span></div>
    <div class="card red" onclick="abrirModulo('Serra')"><i>🪚</i><span>Serra</span></div>
    <div class="card brown" onclick="abrirModulo('Embalagem')"><i>📦</i><span>Embalagem</span></div>
    <div class="card purple" id="card-gestao" onclick="abrirModulo('Gestão')"><i>👥</i><span>Gestão de Pessoas</span></div>
    <div class="card gray" onclick="abrirModulo('Configuração')"><i>🛠️</i><span>Configuração</span></div>
</section>

<section id="modulo-serra" style="display:none;">
    <button onclick="voltarHome()" class="btn-voltar">← Voltar</button>
    <div class="form-section"><h3>Módulo Serra</h3><p>Conteúdo em desenvolvimento...</p></div>
</section>

<section id="modulo-embalagem" style="display:none;">
    <button onclick="voltarHome()" class="btn-voltar">← Voltar</button>
    <div class="form-section"><h3>Módulo Embalagem</h3><p>Conteúdo em desenvolvimento...</p></div>
</section>

            <section id="modulo-bobines" style="display:none;">
                <button onclick="voltarHome()" class="btn-voltar">← Voltar</button>
                <div class="grid-container">
                    <div class="card green" onclick="abrirSubModulo('calc')"><i>🧮</i><span>Calculadora</span></div>
                    <div class="card blue" onclick="abrirSubModulo('rel')"><i>📊</i><span>Relatório</span></div>
                </div>
            </section>

            <section id="bobine-calc" style="display:none;">
                <button onclick="abrirModulo('Bobines')" class="btn-voltar">← Voltar</button>
                <div class="form-section calculator-container">
                    <h2 id="tituloCalc">Calculadora de Bobina</h2>
                    <div id="saudacao" class="saudacao"></div>

                    <label>Largura da bobina externa (cm)</label>
                    <select id="largura-calc"></select>

                    <label>Espessura da chapa (mm)</label>
                    <div id="espessuras-btns" class="btnGroup"></div>

                    <label>Velocidade da máquina (m/min)</label>
                    <div id="velocidades-btns" class="btnGroup"></div>

                    <div id="resultado-calc" class="result-box">
                        <h3 id="res-metros"></h3>
                        <h3 id="res-tempo"></h3>
                        <h3 id="res-hora"></h3>
                    </div>
                </div>
            </section>

            <section id="bobine-rel" style="display:none;">
    <button onclick="abrirModulo('Bobines')" class="btn-voltar">← Voltar</button>
    
    <div class="tabs">
        <button class="tab-btn active" id="tab-bob-prod" onclick="mudarAbaBobine('producao')">Lançamento</button>
        <button class="tab-btn" id="tab-bob-hist" onclick="mudarAbaBobine('historico')">Histórico</button>
    </div>

    <div id="aba-bobine-producao">
        <div class="form-section">
            <label>O que deseja lançar?</label>
            <select id="bob-tipo-entrada" onchange="toggleCamposBobine()">
                <option value="">Selecione...</option>
                <option value="filme">Filme</option>
                <option value="bobina">Bobina (Chapa)</option>
            </select>

            <div id="campos-dinamicos-bobine">
                </div>

            <button onclick="adicionarLancamentoBobine()" class="btn-save green" style="margin-top:10px;">ADICIONAR LANÇAMENTO</button>
        </div>

        <div id="lista-lancamentos-bobine"></div>

        <div class="form-section" style="display: flex; gap: 10px;">
            <button onclick="fimProducaoBobine()" class="btn-save blue">FIM DE PRODUÇÃO</button>
            <button onclick="fecharDiaBobine()" class="btn-save" style="background: #c41e24;">FECHAR DIA / RELATÓRIO</button>
        </div>
    </div>

    <div id="aba-bobine-historico" style="display:none;">
        <div id="lista-historico-bobine"></div>
    </div>
</section>

            <section id="modulo-gestao" style="display:none;">
                <button onclick="voltarHome()" class="btn-voltar">← Voltar</button>
                <div class="form-section">
                    <h3>Monitoramento Real-Time</h3>
                    <div id="lista-monitor"></div>
                </div>
                <div class="form-section">
                    <h3>Cadastrar Usuário</h3>
<input type="text" id="g-nome" placeholder="Nome">
<input type="email" id="g-email" placeholder="ID Do Usuário">

<div class="input-wrapper">
    <input type="password" id="g-senha" placeholder="Senha">
    <span class="toggle-eye" onclick="toggleVisibility('g-senha', this)">👁️</span>
</div>

<select id="g-nivel">
    <option value="limitado">Operador</option>
    <option value="ilimitado">ADM</option>
</select>
                    <button onclick="salvarUsuario()" class="btn-save purple">CRIAR CONTA</button>
                </div>
                <div id="lista-usuarios"></div>
            </section>

            <section id="modulo-injecao" style="display:none;">
                <button onclick="voltarHome()" class="btn-voltar">← Voltar</button>
                <div class="tabs">
                    <button class="tab-btn active" id="tab-rel" onclick="mudarAba('relatorio')">Produção</button>
                    <button class="tab-btn" id="tab-hist" onclick="mudarAba('historico')">Histórico</button>
                </div>
                <div id="aba-relatorio">
                    <div class="form-section"><label>Data:</label><input type="date" id="inj-data"></div>
                    <div class="form-section highlight">
                        <div class="form-row">
                            <select id="inj-painel" class="col-8">
                                <option value="5 Ondas">5 Ondas</option>
                                <option value="Telha Canudo">Telha Canudo</option>
                                <option value="Fachada oculta">Fachada Oculta</option>
                                <option value="Fachada visivel">Fachada visivel</option>
                                <option value="Fachada ondulada">Fachada ondulada</option>
                                <option value="Polipainel">Polipainel</option>
                            </select>
                            <select id="inj-esp" class="col-4">
                                <option value="" disabled selected>mm</option>
                                <option value="20">20 mm</option>
                                <option value="30">30 mm</option>
                                <option value="40">40 mm</option>
                                <option value="50">50 mm</option>
                                <option value="60">60 mm</option>
                                <option value="80">80 mm</option>
                                <option value="100">100 mm</option>
                                <option value="120">120mm</option>
                            </select>
                        </div>
                        <button onclick="iniciarRodada()" class="btn-save blue">ABRIR RODADA</button>
                    </div>
                    <div id="lista-rodadas"></div>
                    <div id="area-edicao" class="form-section edit-box" style="display:none;">
                        <input type="hidden" id="edit-idx">
                        <div class="form-row">
                            <input type="number" id="ed-m" placeholder="Metros">
                            <input type="text" id="ed-v" placeholder="Velocidade">
                        </div>
                        <div class="grid-quimicos">
                            <input type="number" id="q-mdi" placeholder="MDI"><input type="number" id="q-pur" placeholder="PUR">
                            <input type="number" id="q-pir" placeholder="PIR"><input type="number" id="q-c1" placeholder="C1">
                            <input type="number" id="q-c4" placeholder="C4"><input type="number" id="q-pent" placeholder="PENT">
                        </div>
                        <button onclick="salvarEdicao()" class="btn-save green" style="margin-top:10px;">SALVAR</button>
                    </div>
                    <button onclick="fecharPasta()" class="btn-primary" style="margin-top:20px; background: #c41e24;">FECHAR DIA</button>
                </div>
                <div id="aba-historico" style="display:none;"><div id="lista-pastas"></div></div>
            </section>

            <section id="modulo-config" style="display:none;">
                <button onclick="voltarHome()" class="btn-voltar">← Voltar</button>
                <button onclick="mudarTema('claro')" class="btn-save blue">MODO CLARO</button>
                <button onclick="mudarTema('escuro')" class="btn-save gray" style="margin-top:10px;">MODO ESCURO</button>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
